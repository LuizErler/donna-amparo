name: Deploy Donna Amparo — GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'

      - name: Instalar dependencias
        run: flutter pub get

      - name: Criar .env vazio para o asset bundler
        run: echo "" > .env

      - name: Criar dart-defines.json com credenciais
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          python3 -c "
          import json, os
          with open('dart_defines.json', 'w') as f:
              json.dump({
                  'SUPABASE_URL': os.environ['SUPABASE_URL'],
                  'SUPABASE_ANON_KEY': os.environ['SUPABASE_ANON_KEY']
              }, f)
          "

      - name: Build Web
        run: flutter build web --release --base-href /donna-amparo/ --dart-define-from-file=dart_defines.json

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
